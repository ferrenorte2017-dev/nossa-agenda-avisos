name: Avisos Nossa Agenda

on:
  schedule:
    - cron: "*/15 * * * *"   # a cada 15 minutos
  workflow_dispatch:          # permite rodar manualmente pelo botão "Run workflow"

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node enviar.js
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VAPID_SUBJECT: "mailto:ferrenorte2017@gmail.com"
